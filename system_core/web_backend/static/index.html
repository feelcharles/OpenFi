<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenFi - 欢迎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 56px;
            margin-bottom: 20px;
        }
        
        .subtitle {
            color: #666;
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .description {
            color: #888;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 50px;
        }
        
        .enter-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .enter-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }
        
        .enter-button:active {
            transform: translateY(-1px);
        }
        
        .footer {
            margin-top: 50px;
            color: #999;
            font-size: 14px;
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 OpenFi</h1>
        <p class="subtitle">AI 驱动的量化交易系统</p>
        <p class="description">
            智能数据采集 · AI 信号分析 · 自动化交易执行<br>
            实时风险管理 · 多渠道推送通知
        </p>
        
        <button class="enter-button" onclick="enterSystem()">
            一键进入
        </button>
        
        <div class="footer">
            <span class="status-dot"></span>
            <span id="status">系统运行中</span>
        </div>
    </div>
    
    <script>
        // 检查系统状态
        fetch('/health')
            .then(response => response.json())
            .then(data => {
                document.getElementById('status').textContent = '系统运行正常';
            })
            .catch(error => {
                document.getElementById('status').textContent = '系统连接异常';
                document.querySelector('.status-dot').style.background = '#ef4444';
            });
        
        // 进入系统
        function enterSystem() {
            // 检查是否已登录
            const token = localStorage.getItem('token');
            
            if (token) {
                // 已登录，直接进入仪表板
                window.location.href = '/dashboard';
            } else {
                // 未登录，显示登录界面
                showLoginModal();
            }
        }
        
        // 显示登录模态框
        function showLoginModal() {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
            `;
            
            modal.innerHTML = `
                <div style="background: white; padding: 40px; border-radius: 15px; max-width: 400px; width: 90%;">
                    <h2 style="color: #667eea; margin-bottom: 30px; text-align: center;">登录</h2>
                    <div style="margin-bottom: 20px;">
                        <input type="text" id="username" placeholder="用户名" 
                            style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px;">
                    </div>
                    <div style="margin-bottom: 30px;">
                        <input type="password" id="password" placeholder="密码" 
                            style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px;">
                    </div>
                    <div id="error-message" style="color: #ef4444; margin-bottom: 15px; text-align: center; display: none;"></div>
                    <button onclick="login()" 
                        style="width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
                        color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
                        登录
                    </button>
                    <button onclick="closeModal()" 
                        style="width: 100%; padding: 14px; background: #f3f4f6; color: #666; border: none; 
                        border-radius: 8px; font-size: 16px; margin-top: 10px; cursor: pointer;">
                        取消
                    </button>
                </div>
            `;
            
            document.body.appendChild(modal);
            window.loginModal = modal;
            
            // 回车登录
            document.getElementById('password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') login();
            });
        }
        
        // 关闭模态框
        function closeModal() {
            if (window.loginModal) {
                document.body.removeChild(window.loginModal);
                window.loginModal = null;
            }
        }
        
        // 登录
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            
            if (!username || !password) {
                errorMsg.textContent = '请输入用户名和密码';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 保存 token
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);
                    
                    // 检查是否需要修改密码
                    if (data.must_change_password) {
                        closeModal();
                        showChangePasswordModal();
                    } else {
                        // 直接进入仪表板
                        window.location.href = '/dashboard';
                    }
                } else {
                    errorMsg.textContent = data.detail || '登录失败';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.style.display = 'block';
            }
        }
        
        // 显示修改密码模态框
        function showChangePasswordModal() {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
            `;
            
            modal.innerHTML = `
                <div style="background: white; padding: 40px; border-radius: 15px; max-width: 400px; width: 90%;">
                    <h2 style="color: #667eea; margin-bottom: 20px; text-align: center;">首次登录</h2>
                    <p style="color: #666; margin-bottom: 30px; text-align: center;">请修改您的密码</p>
                    <div style="margin-bottom: 20px;">
                        <input type="password" id="old-password" placeholder="当前密码" 
                            style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <input type="password" id="new-password" placeholder="新密码（至少8位）" 
                            style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px;">
                    </div>
                    <div style="margin-bottom: 30px;">
                        <input type="password" id="confirm-password" placeholder="确认新密码" 
                            style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px;">
                    </div>
                    <div id="change-error-message" style="color: #ef4444; margin-bottom: 15px; text-align: center; display: none;"></div>
                    <button onclick="changePassword()" 
                        style="width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
                        color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
                        确认修改
                    </button>
                </div>
            `;
            
            document.body.appendChild(modal);
            window.changePasswordModal = modal;
        }
        
        // 修改密码
        async function changePassword() {
            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('change-error-message');
            
            if (!oldPassword || !newPassword || !confirmPassword) {
                errorMsg.textContent = '请填写所有字段';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (newPassword.length < 8) {
                errorMsg.textContent = '新密码至少需要8位';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                errorMsg.textContent = '两次输入的密码不一致';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/v1/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 密码修改成功，进入仪表板
                    if (window.changePasswordModal) {
                        document.body.removeChild(window.changePasswordModal);
                    }
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.textContent = data.detail || '修改密码失败';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
