<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenFi 仪表板</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --accent-color: #60a5fa;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
        }
        
        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --accent-color: #3b82f6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-left h1 {
            color: var(--accent-color);
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            background: var(--accent-color);
            color: white;
        }
        
        .btn:hover {
            opacity: 0.8;
        }
        
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status.healthy {
            background: var(--success-color);
            color: white;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }
        
        .card h2 {
            color: var(--accent-color);
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            color: var(--text-secondary);
        }
        
        .metric-value {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .ws-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .ws-connected {
            background: var(--success-color);
            animation: pulse 2s infinite;
        }
        
        .ws-disconnected {
            background: var(--error-color);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }
        
        #notifications {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .notification {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>OpenFi <span data-i18n="dashboard">仪表板</span></h1>
                <p>
                    <span class="ws-status" id="wsStatus"></span>
                    <span id="wsStatusText" data-i18n="connecting">连接中...</span>
                    <span class="status healthy" id="systemStatus" data-i18n="loading">加载中...</span>
                </p>
            </div>
            <div class="header-right">
                <button class="btn-secondary btn" onclick="toggleTheme()" id="themeBtn">
                    <span data-i18n="darkMode">🌙 深色</span>
                </button>
                <button class="btn-secondary btn" onclick="toggleLanguage()" id="langBtn">
                    <span id="langText">EN</span>
                </button>
                <button class="btn" onclick="logout()" data-i18n="logout">退出</button>
            </div>
        </header>
        
        <div class="grid">
            <div class="card">
                <h2 data-i18n="systemMetrics">系统指标</h2>
                <div id="metrics">
                    <div class="loading" data-i18n="loadingMetrics">加载指标中...</div>
                </div>
            </div>
            
            <div class="card">
                <h2 data-i18n="todayPerformance">今日表现</h2>
                <div id="performance">
                    <div class="loading" data-i18n="loadingPerformance">加载表现数据中...</div>
                </div>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2 data-i18n="recentSignals">最近信号</h2>
                <div id="signals">
                    <div class="loading" data-i18n="loadingSignals">加载信号中...</div>
                </div>
            </div>
            
            <div class="card">
                <h2 data-i18n="recentTrades">最近交易</h2>
                <div id="trades">
                    <div class="loading" data-i18n="loadingTrades">加载交易中...</div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="notifications"></div>
    
    <script>
        // 国际化文本
        const i18n = {
            zh: {
                dashboard: '仪表板',
                connecting: '连接中...',
                loading: '加载中...',
                darkMode: '🌙 深色',
                lightMode: '☀️ 浅色',
                logout: '退出',
                systemMetrics: '系统指标',
                todayPerformance: '今日表现',
                recentSignals: '最近信号',
                recentTrades: '最近交易',
                loadingMetrics: '加载指标中...',
                loadingPerformance: '加载表现数据中...',
                loadingSignals: '加载信号中...',
                loadingTrades: '加载交易中...',
                activeDataSources: '活跃数据源',
                fetchSuccessRate: '获取成功率',
                activePositions: '活跃持仓',
                accountBalance: '账户余额',
                signalsToday: '今日信号',
                highValueSignals: '高价值信号',
                tradesToday: '今日交易',
                winRate: '胜率',
                noRecentSignals: '暂无最近信号',
                noRecentTrades: '暂无最近交易',
                connected: '实时更新已激活',
                disconnected: '已断开连接',
                newSignal: '新信号',
                tradeExecuted: '交易执行',
                systemEvent: '系统事件'
            },
            en: {
                dashboard: 'Dashboard',
                connecting: 'Connecting...',
                loading: 'Loading...',
                darkMode: '🌙 Dark',
                lightMode: '☀️ Light',
                logout: 'Logout',
                systemMetrics: 'System Metrics',
                todayPerformance: "Today's Performance",
                recentSignals: 'Recent Signals',
                recentTrades: 'Recent Trades',
                loadingMetrics: 'Loading metrics...',
                loadingPerformance: 'Loading performance...',
                loadingSignals: 'Loading signals...',
                loadingTrades: 'Loading trades...',
                activeDataSources: 'Active Data Sources',
                fetchSuccessRate: 'Fetch Success Rate',
                activePositions: 'Active Positions',
                accountBalance: 'Account Balance',
                signalsToday: 'Signals Today',
                highValueSignals: 'High-Value Signals',
                tradesToday: 'Trades Today',
                winRate: 'Win Rate',
                noRecentSignals: 'No recent signals',
                noRecentTrades: 'No recent trades',
                connected: 'Real-time updates active',
                disconnected: 'Disconnected',
                newSignal: 'New Signal',
                tradeExecuted: 'Trade Executed',
                systemEvent: 'System Event'
            }
        };
        
        // 当前语言和主题
        let currentLang = localStorage.getItem('language') || 'zh';
        let currentTheme = localStorage.getItem('theme') || 'dark';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(currentTheme);
            applyLanguage(currentLang);
            connectWebSocket();
            loadMetrics();
            loadSignals();
            loadTrades();
            loadSystemStatus();
            
            // 定期刷新数据
            setInterval(loadMetrics, 30000);
            setInterval(loadSignals, 60000);
            setInterval(loadTrades, 60000);
        });
        
        // 切换主题
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            applyTheme(currentTheme);
        }
        
        function applyTheme(theme) {
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('themeBtn').innerHTML = '<span data-i18n="lightMode">' + i18n[currentLang].lightMode + '</span>';
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.getElementById('themeBtn').innerHTML = '<span data-i18n="darkMode">' + i18n[currentLang].darkMode + '</span>';
            }
        }
        
        // 切换语言
        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('language', currentLang);
            applyLanguage(currentLang);
            // 重新加载数据以更新语言
            loadMetrics();
            loadSignals();
            loadTrades();
        }
        
        function applyLanguage(lang) {
            document.getElementById('langText').textContent = lang === 'zh' ? 'EN' : '中文';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });
        }
        
        function t(key) {
            return i18n[currentLang][key] || key;
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            window.location.href = '/';
        }
        
        const API_BASE = window.location.origin;
        const WS_URL = `ws://${window.location.host}/ws/notifications`;
        let ws = null;
        let reconnectTimeout = null;
        
        function connectWebSocket() {
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onopen = () => {
                    console.log('WebSocket connected');
                    updateWSStatus(true);
                    if (reconnectTimeout) {
                        clearTimeout(reconnectTimeout);
                        reconnectTimeout = null;
                    }
                };
                
                ws.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    handleWebSocketMessage(message);
                };
                
                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateWSStatus(false);
                };
                
                ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    updateWSStatus(false);
                    reconnectTimeout = setTimeout(connectWebSocket, 5000);
                };
            } catch (error) {
                console.error('WebSocket connection failed:', error);
                updateWSStatus(false);
            }
        }
        
        function updateWSStatus(connected) {
            const statusEl = document.getElementById('wsStatus');
            const textEl = document.getElementById('wsStatusText');
            
            if (connected) {
                statusEl.className = 'ws-status ws-connected';
                textEl.textContent = t('connected');
            } else {
                statusEl.className = 'ws-status ws-disconnected';
                textEl.textContent = t('disconnected');
            }
        }
        
        function handleWebSocketMessage(message) {
            console.log('WebSocket message:', message);
            
            switch (message.type) {
                case 'signal':
                    showNotification(t('newSignal'), message.data.summary);
                    loadSignals();
                    loadMetrics();
                    break;
                case 'trade':
                    showNotification(t('tradeExecuted'), `${message.data.direction} ${message.data.symbol}`);
                    loadTrades();
                    loadMetrics();
                    break;
                case 'system_event':
                    showNotification(t('systemEvent'), message.data.message);
                    break;
            }
        }
        
        function showNotification(title, message) {
            const container = document.getElementById('notifications');
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `<strong>${title}</strong><br>${message}`;
            
            container.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 5000);
        }
        
        async function loadMetrics() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/dashboard/metrics`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const data = await response.json();
                
                document.getElementById('metrics').innerHTML = `
                    <div class="metric">
                        <span class="metric-label">${t('activeDataSources')}</span>
                        <span class="metric-value">${data.active_data_sources}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">${t('fetchSuccessRate')}</span>
                        <span class="metric-value">${data.fetch_success_rate}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">${t('activePositions')}</span>
                        <span class="metric-value">${data.active_positions}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">${t('accountBalance')}</span>
                        <span class="metric-value">${data.account_balance.toLocaleString()}</span>
                    </div>
                `;
                
                document.getElementById('performance').innerHTML = `
                    <div class="metric">
                        <span class="metric-label">${t('signalsToday')}</span>
                        <span class="metric-value">${data.signals_today}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">${t('highValueSignals')}</span>
                        <span class="metric-value">${data.high_value_signals_today}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">${t('tradesToday')}</span>
                        <span class="metric-value">${data.trades_today}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">${t('winRate')}</span>
                        <span class="metric-value">${data.win_rate_today}%</span>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load metrics:', error);
            }
        }
        
        async function loadSignals() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/dashboard/recent-signals?limit=5`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const signals = await response.json();
                
                if (signals.length === 0) {
                    document.getElementById('signals').innerHTML = `<p class="loading">${t('noRecentSignals')}</p>`;
                    return;
                }
                
                let html = '';
                signals.forEach(signal => {
                    html += `
                        <div class="metric">
                            <span class="metric-label">${signal.source}</span>
                            <span class="metric-value">${signal.relevance_score}</span>
                        </div>
                    `;
                });
                
                document.getElementById('signals').innerHTML = html;
            } catch (error) {
                console.error('Failed to load signals:', error);
            }
        }
        
        async function loadTrades() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/trades?limit=5`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                const trades = await response.json();
                
                if (trades.length === 0) {
                    document.getElementById('trades').innerHTML = `<p class="loading">${t('noRecentTrades')}</p>`;
                    return;
                }
                
                let html = '';
                trades.forEach(trade => {
                    html += `
                        <div class="metric">
                            <span class="metric-label">${trade.symbol} ${trade.direction}</span>
                            <span class="metric-value">${trade.profit || 0}</span>
                        </div>
                    `;
                });
                
                document.getElementById('trades').innerHTML = html;
            } catch (error) {
                console.error('Failed to load trades:', error);
            }
        }
        
        async function loadSystemStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/dashboard/system-status`);
                const data = await response.json();
                
                const statusEl = document.getElementById('systemStatus');
                statusEl.className = `status ${data.status}`;
                statusEl.textContent = data.status;
            } catch (error) {
                console.error('Failed to load system status:', error);
            }
        }
    </script>
</body>
</html>
