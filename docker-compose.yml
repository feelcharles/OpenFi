version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: openfi-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-openfi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openfi_password}
      POSTGRES_DB: ${DB_NAME:-openfi}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup_db_permissions.sql:/docker-entrypoint-initdb.d/setup_permissions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openfi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openfi-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: openfi-redis
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openfi-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: openfi-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - openfi-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: openfi-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - openfi-network

  # OpenFi Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openfi-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-openfi}:${DB_PASSWORD:-openfi_password}@postgres:5432/${DB_NAME:-openfi}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-openfi}
      DB_PASSWORD: ${DB_PASSWORD:-openfi_password}
      DB_NAME: ${DB_NAME:-openfi}
      
      # Redis
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379/0
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production-min-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-this-encryption-key-32-chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      
      # Application
      APP_NAME: ${APP_NAME:-OpenFi}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # LLM Providers
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL}
      
      # Vector Database
      VECTOR_DB_PROVIDER: ${VECTOR_DB_PROVIDER:-pinecone}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-openfi-vectors}
      
      # External Data Sources
      FOREXFACTORY_API_KEY: ${FOREXFACTORY_API_KEY}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY}
      NEWSAPI_KEY: ${NEWSAPI_KEY}
      TWITTER_API_KEY: ${TWITTER_API_KEY}
      SERPAPI_KEY: ${SERPAPI_KEY}
      
      # Push Channels
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      
      # Broker
      MT4_SERVER: ${MT4_SERVER}
      MT4_LOGIN: ${MT4_LOGIN}
      MT4_PASSWORD: ${MT4_PASSWORD}
      
      # Monitoring
      PROMETHEUS_PORT: ${PROMETHEUS_PORT:-8001}
      
      # Backup
      BACKUP_STORAGE_TYPE: ${BACKUP_STORAGE_TYPE:-local}
      BACKUP_LOCAL_PATH: ${BACKUP_LOCAL_PATH:-/app/backups}
      AWS_S3_BACKUP_BUCKET: ${AWS_S3_BACKUP_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      
    ports:
      - "8686:8686"  # API server
      - "8001:8001"  # Metrics endpoint
      - "8080:8080"  # Web dashboard
    volumes:
      - ./config:/app/config:ro  # Configuration files (read-only)
      - ./ea:/app/ea             # EA files
      - ./logs:/app/logs         # Log files
      - app_backups:/app/backups # Backup storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped
    networks:
      - openfi-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  app_backups:
    driver: local

networks:
  openfi-network:
    driver: bridge
