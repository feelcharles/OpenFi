# Event Bus Configuration
# 事件总线配置文件

# Redis connection settings
redis:
  url: "${REDIS_URL}"
  password: "${REDIS_PASSWORD}"
  pool_min_size: 5
  pool_max_size: 20
  connection_timeout: 30
  socket_timeout: 30
  socket_keepalive: true
  socket_keepalive_options: {}
  retry_on_timeout: true
  health_check_interval: 30

# Topic configurations
topics:
  - name: data.raw.*
    description: Raw data from all fetch sources
    retention_seconds: 3600
    max_queue_depth: 10000
    
  - name: data.raw.economic_calendar
    description: Raw economic calendar events
    retention_seconds: 3600
    max_queue_depth: 5000
    
  - name: data.raw.market_data
    description: Raw market price data
    retention_seconds: 1800
    max_queue_depth: 10000
    
  - name: data.raw.news
    description: Raw news articles
    retention_seconds: 3600
    max_queue_depth: 5000
    
  - name: data.raw.social_media
    description: Raw social media posts
    retention_seconds: 3600
    max_queue_depth: 5000
    
  - name: data.raw.academic_paper
    description: Raw academic papers
    retention_seconds: 7200
    max_queue_depth: 1000
    
  - name: ai.analyzed
    description: All AI-analyzed signals
    retention_seconds: 7200
    max_queue_depth: 5000
    
  - name: ai.high_value_signal
    description: High-value signals (score > threshold)
    retention_seconds: 7200
    max_queue_depth: 5000
    
  - name: trading.signal
    description: Generated trading signals
    retention_seconds: 3600
    max_queue_depth: 1000
    
  - name: trading.executed
    description: Executed trades
    retention_seconds: 86400
    max_queue_depth: 5000
    
  - name: config.reloaded.*
    description: Configuration reload notifications
    retention_seconds: 300
    max_queue_depth: 100
    
  - name: system.health.*
    description: System health events
    retention_seconds: 600
    max_queue_depth: 1000

# Dead Letter Queue settings
dead_letter_queue:
  enabled: true
  max_retry_attempts: 3
  retry_delay_seconds: 60
  retry_backoff_multiplier: 2
  retention_days: 7
  max_size: 10000

# Message serialization
serialization:
  format: json
  encoding: utf-8
  compression: none  # none, gzip, lz4
  include_schema_version: true
  validate_on_publish: true
  validate_on_subscribe: true

# Delivery guarantees
delivery:
  guarantee: at_least_once
  deduplication_enabled: true
  deduplication_window_seconds: 300
  acknowledgment_timeout: 30
  max_in_flight_messages: 100

# Backpressure handling
backpressure:
  enabled: true
  strategy: reject  # reject, block, drop_oldest
  queue_full_threshold: 0.9  # Trigger backpressure at 90% capacity
  
# Metrics and monitoring
metrics:
  enabled: true
  export_interval_seconds: 15
  include_per_topic_metrics: true
  include_subscriber_metrics: true
  prometheus_port: 8001

# Graceful shutdown
shutdown:
  grace_period_seconds: 30
  wait_for_in_flight: true
  drain_queues: false

# Performance tuning
performance:
  batch_publish_enabled: false
  batch_publish_size: 10
  batch_publish_timeout_ms: 100
  prefetch_count: 10
  worker_threads: 4

# Logging
logging:
  log_all_events: false
  log_failed_events: true
  log_slow_events: true
  slow_event_threshold_ms: 1000
  include_payload_in_logs: false  # Security: don't log sensitive data
