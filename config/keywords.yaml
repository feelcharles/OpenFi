# ============================================
# 优先级定义（3个等级）
# ============================================
priorities:
  critical:
    name_zh: "紧急"
    name_en: "Critical"
    weight: 3
    description: "最高优先级，立即推送"
    push_immediately: true
    
  high:
    name_zh: "重要"
    name_en: "High"
    weight: 2
    description: "高优先级，优先推送"
    push_immediately: true
    
  medium:
    name_zh: "一般"
    name_en: "Medium"
    weight: 1
    description: "中等优先级，定时推送"
    push_immediately: false

# ============================================
# 翻译设置
# ============================================
translation:
  # 是否启用自动翻译
  enabled: true
  
  # 翻译服务提供商
  # 设置为 "default" 表示使用 llm_config.yaml 中的 default_model 配置
  # 也可以设置为具体的 provider: "openai", "deepl", "google"
  provider: "default"
  
  # API配置（当 provider 为 "default" 时，这些配置会被忽略）
  # 系统会自动使用 llm_config.yaml 中的 default_model.overrides.translation 配置
  api_config:
    # 这些配置仅在 provider 不是 "default" 时使用
    openai_model: ""  # 留空表示使用默认配置
    max_tokens: 100
    temperature: 0.3
  
  # 缓存翻译结果
  cache_enabled: true
  cache_ttl: 86400  # 24 hours in seconds
