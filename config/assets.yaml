# Assets Configuration
# 交易品种配置文件
# 
# 包含所有关注的金融品种：外汇、贵金属、能源、指数、加密货币等
# 
# 优先级分级说明：
# - priority_level: 1 (第一级) - 最多3个，根据快讯及事件回测并推荐
# - priority_level: 2 (第二级) - 最多10个，可设置EA定时自动回测
# - priority_level: 3 (第三级) - 60个，在周报中提及，结合新闻舆情

# ============================================
# 关注的金融品种
# ============================================

# 外汇货币对
forex:
  - symbol: "EURUSD"
    name_zh: "欧元/美元"
    name_en: "Euro/US Dollar"
    enabled: true
    priority_level: 1  # 第一级：重点关注
    
  - symbol: "GBPUSD"
    name_zh: "英镑/美元"
    name_en: "British Pound/US Dollar"
    enabled: true
    priority_level: 2  # 第二级：定期关注
    
  - symbol: "USDJPY"
    name_zh: "美元/日元"
    name_en: "US Dollar/Japanese Yen"
    enabled: true
    priority_level: 2  # 第二级：定期关注
    
  - symbol: "AUDUSD"
    name_zh: "澳元/美元"
    name_en: "Australian Dollar/US Dollar"
    enabled: true
    priority_level: 3  # 第三级：周报关注
    
  - symbol: "USDCAD"
    name_zh: "美元/加元"
    name_en: "US Dollar/Canadian Dollar"
    enabled: true
    priority_level: 3  # 第三级：周报关注
    
  - symbol: "USDCHF"
    name_zh: "美元/瑞郎"
    name_en: "US Dollar/Swiss Franc"
    enabled: true
    priority_level: 3  # 第三级：周报关注
    
  - symbol: "NZDUSD"
    name_zh: "纽元/美元"
    name_en: "New Zealand Dollar/US Dollar"
    enabled: true
    priority_level: 3  # 第三级：周报关注

# 贵金属
metals:
  - symbol: "XAUUSD"
    name_zh: "黄金/美元"
    name_en: "Gold/US Dollar"
    enabled: true
    priority_level: 1  # 第一级：重点关注
    
  - symbol: "XAGUSD"
    name_zh: "白银/美元"
    name_en: "Silver/US Dollar"
    enabled: true
    priority_level: 2  # 第二级：定期关注

# 原油
energy:
  - symbol: "USOIL"
    name_zh: "美国原油"
    name_en: "US Crude Oil"
    enabled: true
    priority_level: 2  # 第二级：定期关注
    
  - symbol: "UKOIL"
    name_zh: "布伦特原油"
    name_en: "Brent Crude Oil"
    enabled: true
    priority_level: 3  # 第三级：周报关注

# 指数
indices:
  - symbol: "US30"
    name_zh: "道琼斯指数"
    name_en: "Dow Jones Industrial Average"
    enabled: true
    priority_level: 2  # 第二级：定期关注
    
  - symbol: "SPX500"
    name_zh: "标普500指数"
    name_en: "S&P 500"
    enabled: true
    priority_level: 1  # 第一级：重点关注
    
  - symbol: "NAS100"
    name_zh: "纳斯达克100指数"
    name_en: "NASDAQ 100"
    enabled: true
    priority_level: 2  # 第二级：定期关注
    
  - symbol: "GER40"
    name_zh: "德国DAX指数"
    name_en: "Germany 40"
    enabled: true
    priority_level: 3  # 第三级：周报关注

# 加密货币
crypto:
  - symbol: "BTCUSD"
    name_zh: "比特币/美元"
    name_en: "Bitcoin/US Dollar"
    enabled: false
    priority_level: 2  # 第二级：定期关注
    
  - symbol: "ETHUSD"
    name_zh: "以太坊/美元"
    name_en: "Ethereum/US Dollar"
    enabled: false
    priority_level: 3  # 第三级：周报关注

# 股票（可选，根据需要添加）
stocks:
  - symbol: "AAPL"
    name_zh: "苹果公司"
    name_en: "Apple Inc."
    enabled: false
    priority_level: 3  # 第三级：周报关注
    
  - symbol: "MSFT"
    name_zh: "微软公司"
    name_en: "Microsoft Corporation"
    enabled: false
    priority_level: 3  # 第三级：周报关注
    
  - symbol: "GOOGL"
    name_zh: "谷歌"
    name_en: "Alphabet Inc."
    enabled: false
    priority_level: 3  # 第三级：周报关注
    
  - symbol: "AMZN"
    name_zh: "亚马逊"
    name_en: "Amazon.com Inc."
    enabled: false
    priority_level: 3  # 第三级：周报关注
    
  - symbol: "TSLA"
    name_zh: "特斯拉"
    name_en: "Tesla Inc."
    enabled: false
    priority_level: 3  # 第三级：周报关注

# ============================================
# 优先级配置
# ============================================
priority_levels:
  level_1:
    name_zh: "重点关注"
    name_en: "Top Priority"
    max_count: 3
    description: "最重要的品种，根据快讯及事件回测并推荐EA"
    features:
      - "实时价格推送"
      - "事件触发EA回测"
      - "快讯关联分析"
      - "优先推送"
    
  level_2:
    name_zh: "定期关注"
    name_en: "Regular Monitoring"
    max_count: 10
    description: "重要品种，可设置EA定时自动回测"
    features:
      - "定时价格推送"
      - "定时EA回测"
      - "日报包含"
      - "重要事件推送"
    
  level_3:
    name_zh: "周报关注"
    name_en: "Weekly Review"
    max_count: 60
    description: "一般品种，在周报中提及，结合新闻舆情数据"
    features:
      - "周报包含"
      - "新闻关联"
      - "舆情分析"
      - "趋势总结"
